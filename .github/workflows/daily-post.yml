name: Daily post from queue

on:
  schedule:
    # 14:00 UTC = 10am ET (EDT) / 9am ET (EST). Adjust to your timezone.
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'How many queued posts to publish this run'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish from queue
        env:
          POSTS_PER_RUN: ${{ github.event.inputs.count || '1' }}
        run: python scripts/publish_from_queue.py

      - name: Commit and push
        run: |
          git config user.email "bot@migukstory.com"
          git config user.name "Miguk Story Bot"
          git add src/content/blog/ queue/
          if git diff --staged --quiet; then
            echo "Nothing to commit (queue may be empty)."
            exit 0
          fi
          today=$(date -u +"%Y-%m-%d")
          git commit -m "post: scheduled publish (${today})"
          git push
